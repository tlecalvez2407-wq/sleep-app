<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Cycle</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="container">

<header class="header">
    <h1>Sleep Cycle</h1>
    <p class="subtitle">Analyse de ton rythme de sommeil</p>
</header>

<div class="card">

<label for="wake">Heure de réveil</label>
<input type="time" id="wake">

<button onclick="calc()">Calculer les heures de coucher</button>
<button class="secondary" onclick="sleepNow()">Je vais dormir maintenant</button>

<div class="timer" id="timer"></div>

<div id="results" class="results"></div>

<p class="info">
Cycles de sommeil de 90 minutes + 15 minutes d’endormissement
</p>

</div>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
