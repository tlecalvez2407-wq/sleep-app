<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Cycle</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<!-- iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui, sans-serif;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:420px;
}

h1{
    text-align:center;
}

.card{
    background:#111;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
}

input,
button{
    display:block;
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

button{
    background:#4f8cff;
    color:white;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.result{
    margin-top:10px;
    padding:15px;
    border-radius:12px;
    background:#1a1a1a;
    transition:.3s;
}

.good{
    border-left:5px solid #22c55e;
}

.mid{
    border-left:5px solid #f59e0b;
}

.bad{
    border-left:5px solid #ef4444;
}

.timer{
    font-size:20px;
    margin-top:15px;
    text-align:center;
    color:#4f8cff;
}

.small{
    font-size:12px;
    color:#aaa;
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>😴 Sleep Cycle</h1>

<div class="card">

<input type="time" id="wake">

<button onclick="calc()">Calculer coucher</button>
<button onclick="sleepNow()">Je vais dormir maintenant</button>

<div class="timer" id="timer"></div>

<div id="results"></div>

<div class="small">
Cycles de 90 min + 15 min d’endormissement
</div>

</div>

</div>

<script src="app.js"></script>

<!-- PWA SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
