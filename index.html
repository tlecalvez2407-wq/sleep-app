<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleep Cycle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <!-- HOME -->
        <div id="homeView" class="view active">
            <div class="card">
                <h1>Sleep Cycle</h1>
                <p class="subtitle">Optimisez votre repos</p>

                <div class="input-group">
                    <label for="wake">Heure de réveil souhaitée</label>
                    <input type="time" id="wake" value="07:00">
                </div>

                <button onclick="calc()">Calculer les cycles</button>
                <button class="secondary" onclick="sleepNow()">Je vais dormir maintenant</button>

                <div id="timerContainer" class="timer-container">
                    <p class="timer-label">Prochain cycle optimal dans</p>
                    <div class="timer" id="timer"></div>
                </div>

                <div id="results"></div>
            </div>
        </div>

        <!-- STATS -->
        <div id="statsView" class="view">
            <div class="card">
                <h2>Statistiques</h2>
                <div id="statsContent">
                    <p class="subtitle">Analyse de vos 7 dernières nuits</p>
                    <div style="text-align: center; padding: 40px 0;">
                        <svg viewBox="0 0 24 24" width="48" height="48" stroke="var(--primary)" fill="none" stroke-width="1.5">
                            <path d="M3 19V5m6 14V9m6 10V3m6 16V11" stroke-linecap="round"/>
                        </svg>
                        <p style="margin-top: 10px; color: var(--text-dim);">Les graphiques arrivent bientôt !</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- HISTORY -->
        <div id="historyView" class="view">
            <div class="card">
                <h2>Historique</h2>
                <p class="subtitle">Vos derniers enregistrements</p>
                
                <div id="historyList">
                    <p style="text-align: center; color: var(--text-dim); padding: 20px;">Aucune nuit enregistrée</p>
                </div>

                <button class="secondary" style="margin-top: 24px;" onclick="clearHistory()">
                    Réinitialiser l'historique
                </button>
            </div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <button id="nav-home" onclick="switchView('home')" class="active">
            <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor">
                <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <button id="nav-stats" onclick="switchView('stats')">
            <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor">
                <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <button id="nav-history" onclick="switchView('history')">
            <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor">
                <path d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </nav>

    <script src="app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("service-worker.js")
                    .then(reg => console.log("SW registered", reg))
                    .catch(err => console.log("SW failed", err));
            });
        }
    </script>
</body>
</html>
