<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Cycle</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="homeView" class="view active">
    <div class="card">

        <h1>Sleep Cycle</h1>
        <p class="subtitle">Analyse du sommeil</p>

        <label>Heure de réveil</label>
        <input type="time" id="wake">

        <button onclick="calc()">Calculer les heures</button>
        <button class="secondary" onclick="sleepNow()">Je vais dormir maintenant</button>

        <div class="timer" id="timer"></div>

        <div id="results"></div>

    </div>
</div>

<!-- STATS -->
<div id="statsView" class="view">
    <div class="card">
        <h2>Stats</h2>
        <p>En cours de développement</p>
    </div>
</div>

<!-- HISTORY -->
<div id="historyView" class="view">
    <div class="card">

        <h2>Historique</h2>

        <button class="secondary" onclick="clearHistory()">
            Réinitialiser l'historique
        </button>

        <div id="historyList">
            <p>Aucune nuit enregistrée</p>
        </div>

    </div>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">

<button onclick="switchView('home')">
<svg viewBox="0 0 24 24" class="icon">
<path d="M3 10.5L12 3l9 7.5V21H4V10.5z"
stroke="currentColor" stroke-width="2" fill="none"/>
</svg>
</button>

<button onclick="switchView('stats')">
<svg viewBox="0 0 24 24" class="icon">
<path d="M4 19V5m6 14V9m6 10V3m6 16V11"
stroke="currentColor" stroke-width="2"/>
</svg>
</button>

<button onclick="switchView('history')">
<svg viewBox="0 0 24 24" class="icon">
<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none" />
<path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
</button>

<div class="nav-indicator"></div>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
