<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Cycle</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="homeView" class="view active">
    <div class="card">
        <h1>Sleep Cycle</h1>
        <p class="subtitle">Optimisation du sommeil</p>

        <label>Heure de réveil</label>
        <input type="time" id="wake">

        <button onclick="calc()">Calculer les heures</button>
        <button class="secondary" onclick="sleepNow()">Je vais dormir maintenant</button>

        <div class="timer" id="timer"></div>

        <div id="results"></div>
    </div>
</div>

<!-- STATS -->
<div id="statsView" class="view">
    <div class="card">
        <h2>Stats</h2>
        <p>À venir : analyse de ton sommeil</p>
    </div>
</div>

<!-- HISTORY -->
<div id="historyView" class="view">
    <div class="card">
        <h2>Historique</h2>
        <p>À venir : tes nuits enregistrées</p>
    </div>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">

<button onclick="switchView('home')">🏠</button>
<button onclick="switchView('stats')">📊</button>
<button onclick="switchView('history')">🕒</button>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
