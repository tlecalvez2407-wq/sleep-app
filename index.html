<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleep Cycle</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="container">

<!-- VUE HOME -->
<div id="homeView" class="view active">

<header class="header">
    <h1>Sleep Cycle</h1>
    <p class="subtitle">Analyse de ton rythme de sommeil</p>
</header>

<div class="card">

<label for="wake">Heure de réveil</label>
<input type="time" id="wake">

<button onclick="calc()">Calculer les heures de coucher</button>
<button class="secondary" onclick="sleepNow()">Je vais dormir maintenant</button>

<div class="timer" id="timer"></div>

<div id="results" class="results"></div>

<p class="info">
Cycles de sommeil de 90 minutes + 15 minutes d’endormissement
</p>

</div>

</div>

<!-- VUE STATS -->
<div id="statsView" class="view">
    <div class="card">
        <h2>Stats</h2>
        <p>Bientôt : score de sommeil + analyse</p>
    </div>
</div>

<!-- VUE HISTORIQUE -->
<div id="historyView" class="view">
    <div class="card">
        <h2>Historique</h2>
        <p>Bientôt : tes nuits enregistrées</p>
    </div>
</div>

</div>

<!-- NAV BAR -->
<div class="navbar">

<button onclick="switchView('home')">
<svg viewBox="0 0 24 24" class="icon">
<path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10.5z"
stroke="currentColor" stroke-width="2" fill="none"/>
</svg>
</button>

<button onclick="switchView('stats')">
<svg viewBox="0 0 24 24" class="icon">
<path d="M4 19V5m6 14V9m6 10V3m6 16V11"
stroke="currentColor" stroke-width="2" fill="none"/>
</svg>
</button>

<button onclick="switchView('history')">
<svg viewBox="0 0 24 24" class="icon">
<path d="M12 8v5l3 2m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"
stroke="currentColor" stroke-width="2" fill="none"/>
</svg>
</button>
<div class="nav-indicator"></div>

</div>

</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
